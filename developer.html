<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3moj00 | Studio Command</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff6b35; --bg: #0a0a0a; --card: #141414; --border: rgba(255, 255, 255, 0.07); --sidebar-w: 260px; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #efefef; display: flex; margin: 0; min-height: 100vh; }
        .sidebar { width: var(--sidebar-w); background: #000; border-right: 1px solid var(--border); padding: 2rem 1.5rem; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; }
        .sidebar-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 3rem; }
        .sidebar-logo span { font-weight: 800; font-size: 1.2rem; color: var(--accent); letter-spacing: 1px; }
        .nav-link { background: none; border: none; color: #888; padding: 12px 15px; width: 100%; text-align: left; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 600; margin-bottom: 8px; transition: 0.2s; }
        .nav-link.active { background: var(--accent); color: #fff; }
        .content { margin-left: var(--sidebar-w); padding: 3rem; flex: 1; max-width: 1400px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; margin-bottom: 2rem; }
        .video-item-row { background: #1c1c1c; border-radius: 15px; padding: 12px 20px; display: grid; grid-template-columns: 60px 140px 1fr 180px; align-items: center; gap: 20px; margin-bottom: 10px; border: 1px solid transparent; }
        .video-item-row:hover { border-color: var(--accent); }
        .move-btns { display: flex; flex-direction: column; gap: 4px; }
        .btn-small { background: #252525; border: none; color: #fff; border-radius: 5px; cursor: pointer; font-size: 0.75rem; padding: 6px; }
        .thumb-preview { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; background: #333; }
        .badge { font-size: 0.65rem; text-transform: uppercase; font-weight: 800; padding: 4px 8px; background: #000; color: var(--accent); border-radius: 5px; border: 1px solid var(--border); }
        .btn-primary { background: var(--accent); color: #fff; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .dev-view { display: none; } .dev-view.active { display: block; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="loading"><p>Syncing Order...</p></div>

    <nav class="sidebar">
        <div class="sidebar-logo"><span>STUDIO CMD</span></div>
        <button class="nav-link active" onclick="showView('dashboard')"><i class="fas fa-home"></i> Dashboard</button>
        <button class="nav-link" onclick="showView('videos')"><i class="fas fa-layer-group"></i> Master Order</button>
        <button class="nav-link" onclick="showView('clients')"><i class="fas fa-users"></i> Clients</button>
        <a href="index.html" class="nav-link" style="margin-top:auto"><i class="fas fa-eye"></i> View Site</a>
    </nav>

    <main class="content">
        <div id="view-dashboard" class="dev-view active">
            <h1>Welcome, 3moj00</h1>
            <div class="card"><h3>Total Mixed Projects: <span id="count-vids">0</span></h3></div>
        </div>

        <div id="view-videos" class="dev-view">
            <div class="card">
                <h3>Add New Video</h3>
                <form id="videoForm">
                    <input type="text" name="title" placeholder="Title" required style="width:200px; padding:10px; border-radius:10px; border:none; background:#000; color:#fff">
                    <select name="category" id="cat-select" style="padding:10px; border-radius:10px; background:#000; color:#fff"></select>
                    <input type="url" name="url" placeholder="YouTube URL" required style="width:300px; padding:10px; border-radius:10px; border:none; background:#000; color:#fff">
                    <button type="submit" class="btn-primary">Add</button>
                </form>
            </div>
            <div class="card">
                <h3>Global Sort (Mix everything here)</h3>
                <div id="video-list"></div>
            </div>
        </div>

        <div id="view-clients" class="dev-view">
            <div class="card">
                <h3>Auto-Fetch Client</h3>
                <input type="url" id="magic-url" placeholder="Paste Channel URL" style="width:300px; padding:10px; background:#000; color:#fff; border:none; border-radius:10px">
                <button class="btn-primary" onclick="fetchClientInfo()">Magic Fetch</button>
            </div>
            <div id="client-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap:15px"></div>
        </div>
    </main>

    <script>
        let db = null;

        async function init() {
            const res = await fetch('/api/data?t=' + Date.now());
            db = await res.json();
            
            // Migration: If projects list doesn't exist, create it from old data
            if(!db.projects) {
                db.projects = [];
                Object.keys(db.portfolioData || {}).forEach(cat => {
                    db.portfolioData[cat].forEach(v => {
                        if(v.title) db.projects.push({...v, categoryId: cat});
                    });
                });
            }

            populateSelects();
            renderVideos();
            renderClients();
            document.getElementById('count-vids').innerText = db.projects.length;
        }

        function showView(view) {
            document.querySelectorAll('.dev-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function populateSelects() {
            const s = document.getElementById('cat-select');
            s.innerHTML = '';
            Object.keys(db.portfolioTabs).forEach(id => {
                s.innerHTML += `<option value="${id}">${db.portfolioTabs[id].name}</option>`;
            });
        }

        function renderVideos() {
            const container = document.getElementById('video-list');
            container.innerHTML = '';
            db.projects.forEach((vid, idx) => {
                const row = document.createElement('div');
                row.className = 'video-item-row';
                const ytId = vid.url.match(/(?:youtu\.be\/|youtube\.com\/(?:shorts\/|watch\?v=))([\w-]{11})/)?.[1];
                row.innerHTML = `
                    <div class="move-btns">
                        <button class="btn-small" onclick="move(${idx}, -1)"><i class="fas fa-chevron-up"></i></button>
                        <button class="btn-small" onclick="move(${idx}, 1)"><i class="fas fa-chevron-down"></i></button>
                    </div>
                    <img src="https://img.youtube.com/vi/${ytId}/mqdefault.jpg" class="thumb-preview">
                    <div><span class="badge">${db.portfolioTabs[vid.categoryId]?.name || 'Video'}</span><div>${vid.title}</div></div>
                    <button class="btn-small" onclick="del(${idx})" style="background:#f44336">Delete</button>
                `;
                container.appendChild(row);
            });
        }

        async function move(idx, dir) {
            const target = idx + dir;
            if(target >= 0 && target < db.projects.length) {
                [db.projects[idx], db.projects[target]] = [db.projects[target], db.projects[idx]];
                await sync();
                renderVideos();
            }
        }

        async function sync() {
            document.getElementById('loading').style.display = 'flex';
            const res = await fetch('/api/data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(db)
            });
            document.getElementById('loading').style.display = 'none';
        }

        document.getElementById('videoForm').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            db.projects.unshift({ title: fd.get('title'), url: fd.get('url'), categoryId: fd.get('category') });
            await sync();
            renderVideos();
            e.target.reset();
        };

        async function fetchClientInfo() {
            const url = document.getElementById('magic-url').value;
            const proxy = "https://api.allorigins.win/get?url=";
            const res = await fetch(proxy + encodeURIComponent(url));
            const data = await res.json();
            const doc = new DOMParser().parseFromString(data.contents, 'text/html');
            const name = doc.querySelector('meta[property="og:title"]')?.content.replace(" - YouTube","");
            const logo = doc.querySelector('meta[property="og:image"]')?.content;
            if(name) {
                db.clients.push({ name, channelUrl: url, thumbnailUrl: logo });
                await sync();
                renderClients();
            }
        }

        function renderClients() {
            const c = document.getElementById('client-list');
            c.innerHTML = '';
            db.clients.forEach((cl, i) => {
                c.innerHTML += `<div class="card" style="text-align:center"><img src="${cl.thumbnailUrl}" style="width:60px; border-radius:50%"><p>${cl.name}</p><button onclick="delCl(${i})">Del</button></div>`;
            });
        }

        async function delCl(i) { db.clients.splice(i, 1); await sync(); renderClients(); }
        async function del(i) { db.projects.splice(i, 1); await sync(); renderVideos(); }

        window.onload = init;
    </script>
</body>
</html>
