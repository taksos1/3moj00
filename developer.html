<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3moj00 | Studio Command</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #ff6b35;
            --accent-glow: rgba(255, 107, 53, 0.2);
            --bg: #0a0a0a;
            --card: #141414;
            --border: rgba(255, 255, 255, 0.07);
            --sidebar-w: 260px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: #efefef;
            display: flex;
            margin: 0;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-w);
            background: #000;
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .sidebar-logo {
            display: flex;
            align-items: center; gap: 12px; margin-bottom: 3rem;
        }
        .sidebar-logo img { height: 35px; }
        .sidebar-logo span { font-weight: 800; font-size: 1.2rem; color: var(--accent); letter-spacing: 1px; }

        .nav-link {
            background: none; border: none; color: #888;
            padding: 12px 15px; width: 100%; text-align: left;
            border-radius: 12px; cursor: pointer; display: flex;
            align-items: center; gap: 12px; font-weight: 600;
            margin-bottom: 8px; transition: 0.2s;
        }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-link.active { background: var(--accent); color: #fff; box-shadow: 0 10px 20px var(--accent-glow); }

        /* Content Area */
        .content { margin-left: var(--sidebar-w); padding: 3rem; flex: 1; max-width: 1400px; }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .header-row h1 { font-size: 2rem; font-weight: 800; margin: 0; }

        /* Cards */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; margin-bottom: 2rem; }
        .card h3 { margin-top: 0; color: #fff; font-weight: 700; margin-bottom: 1.5rem; }

        /* Row Layouts */
        .item-row {
            background: #1c1c1c; border-radius: 15px; padding: 12px 20px;
            display: grid; grid-template-columns: 60px 140px 1fr 180px;
            align-items: center; gap: 20px; border: 1px solid transparent;
            transition: 0.2s; margin-bottom: 10px;
        }
        .cat-row { grid-template-columns: 50px 1fr 150px; }

        .move-btns { display: flex; flex-direction: column; gap: 4px; }
        .btn-small { 
            background: #252525; border: none; color: #fff; 
            border-radius: 5px; cursor: pointer; font-size: 0.75rem; padding: 6px;
        }
        .btn-small:hover { background: var(--accent); }

        .thumb-preview { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; background: #333; }
        .badge { font-size: 0.65rem; text-transform: uppercase; font-weight: 800; padding: 4px 8px; background: #2a2a2a; color: var(--accent); border-radius: 5px; }

        /* Forms */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { margin-bottom: 1rem; }
        .input-group label { display: block; font-size: 0.8rem; color: #777; margin-bottom: 6px; font-weight: 600; }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%; background: #000; border: 1px solid var(--border);
            border-radius: 10px; padding: 10px 15px; color: #fff; font-family: inherit;
        }

        .btn-primary { background: var(--accent); color: #fff; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px var(--accent-glow); }

        /* Visibility View */
        .dev-view { display: none; }
        .dev-view.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .client-item { background: #1c1c1c; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid var(--border); }
        .client-item img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 15px; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-logo">
            <img src="icon.png" alt="3moj00">
            <span>STUDIO CMD</span>
        </div>

        <button class="nav-link active" onclick="showView('dashboard')"><i class="fas fa-th-large"></i> Dashboard</button>
        <button class="nav-link" onclick="showView('videos')"><i class="fas fa-film"></i> My Videos</button>
        <button class="nav-link" onclick="showView('categories')"><i class="fas fa-tags"></i> Categories</button>
        <button class="nav-link" onclick="showView('clients')"><i class="fas fa-users"></i> Clients</button>
        
        <div style="margin-top: auto;">
            <button class="nav-link" onclick="exportBackup()"><i class="fas fa-save"></i> Backup JSON</button>
            <a href="index.html" class="nav-link" style="text-decoration: none;"><i class="fas fa-external-link-alt"></i> Public Site</a>
        </div>
    </nav>

    <main class="content">
        
        <!-- DASHBOARD -->
        <div id="view-dashboard" class="dev-view active">
            <div class="header-row"><h1>Dashboard</h1></div>
            <div class="form-grid">
                <div class="card">
                    <h3>Summary</h3>
                    <div style="display:flex; gap:30px;">
                        <div><div id="count-vids" style="font-size: 2.5rem; font-weight: 800; color:var(--accent)">0</div><div style="color:#666">Videos</div></div>
                        <div><div id="count-clients" style="font-size: 2.5rem; font-weight: 800; color:var(--accent)">0</div><div style="color:#666">Clients</div></div>
                    </div>
                </div>
                <div class="card">
                    <h3>Visibility Controls</h3>
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <span>Show Clients Section</span>
                        <button id="toggle-clients" class="btn-primary" onclick="toggleVisibility()">Active</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- VIDEOS -->
        <div id="view-videos" class="dev-view">
            <div class="header-row">
                <h1>Video Inventory</h1>
                <button class="btn-primary" onclick="toggleAddForm()"><i class="fas fa-plus"></i> Add New Video</button>
            </div>

            <div id="add-form" class="card" style="display:none; border: 2px solid var(--accent)">
                <h3>Add Project</h3>
                <form id="videoForm">
                    <div class="form-grid">
                        <div class="input-group"><label>Title</label><input type="text" name="title" required></div>
                        <div class="input-group"><label>Category</label><select name="category" id="cat-select"></select></div>
                    </div>
                    <div class="input-group"><label>YouTube Link</label><input type="url" name="url" required></div>
                    <div style="display:flex; gap:10px">
                        <button type="submit" class="btn-primary">Add Video</button>
                        <button type="button" class="btn-primary" style="background:#333" onclick="toggleAddForm()">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem">
                    <h3 style="margin:0">Sort & Edit</h3>
                    <select id="filter-cat" onchange="renderVideos()" style="background:#222; color:#fff; padding:6px; border-radius:8px; border:1px solid #444">
                        <option value="all">All Categories</option>
                    </select>
                </div>
                <div id="video-list"></div>
            </div>
        </div>

        <!-- CATEGORIES -->
        <div id="view-categories" class="dev-view">
            <div class="header-row">
                <h1>Categories</h1>
                <button class="btn-primary" onclick="addNewCategory()"><i class="fas fa-plus"></i> New Category</button>
            </div>
            <div class="card">
                <div id="category-list"></div>
            </div>
        </div>

        <!-- CLIENTS -->
        <div id="view-clients" class="dev-view">
            <div class="header-row"><h1>Client List</h1></div>
            <div class="card">
                <form id="clientForm">
                    <div class="form-grid">
                        <div class="input-group"><label>Name</label><input type="text" name="name" required></div>
                        <div class="input-group"><label>Subscribers (e.g. 50K)</label><input type="text" name="subscribers"></div>
                    </div>
                    <div class="input-group"><label>YouTube URL</label><input type="url" name="channelUrl" required></div>
                    <button type="submit" class="btn-primary">Add Client</button>
                </form>
            </div>
            <div id="client-list" class="client-grid"></div>
        </div>

    </main>

    <script>
        let db = null;

        async function init() {
            const res = await fetch('/api/data?t=' + Date.now());
            db = await res.json();
            
            // Auto-clean broken/empty items
            Object.keys(db.portfolioData).forEach(cat => {
                db.portfolioData[cat] = db.portfolioData[cat].filter(v => v && v.title && v.url);
            });

            populateSelects();
            updateCounts();
            renderVideos();
            renderClients();
            renderCategories();
        }

        function showView(view) {
            document.querySelectorAll('.dev-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            event.currentTarget.classList.add('active');
            
            if(view === 'categories') renderCategories();
            if(view === 'videos') renderVideos();
        }

        function populateSelects() {
            const catSelect = document.getElementById('cat-select');
            const filterSelect = document.getElementById('filter-cat');
            catSelect.innerHTML = '';
            filterSelect.innerHTML = '<option value="all">All Categories</option>';
            
            Object.keys(db.portfolioTabs).forEach(id => {
                const opt = `<option value="${id}">${db.portfolioTabs[id].name}</option>`;
                catSelect.innerHTML += opt;
                filterSelect.innerHTML += opt;
            });
        }

        function updateCounts() {
            let totalV = 0;
            Object.values(db.portfolioData).forEach(a => totalV += a.length);
            document.getElementById('count-vids').innerText = totalV;
            document.getElementById('count-clients').innerText = db.clients ? db.clients.length : 0;
            const t = document.getElementById('toggle-clients');
            t.innerText = db.showClients ? 'Active' : 'Hidden';
            t.style.background = db.showClients ? 'var(--accent)' : '#333';
        }

        // --- Video Logic ---
        function getYTId(url) {
            const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:shorts\/|watch\?v=))([\w-]{11})/);
            return match ? match[1] : null;
        }

        function renderVideos() {
            const container = document.getElementById('video-list');
            const filter = document.getElementById('filter-cat').value;
            container.innerHTML = '';

            Object.keys(db.portfolioData).forEach(catId => {
                if (filter !== 'all' && filter !== catId) return;

                db.portfolioData[catId].forEach((vid, idx) => {
                    const id = getYTId(vid.url);
                    const thumb = id ? `https://img.youtube.com/vi/${id}/mqdefault.jpg` : 'icon.png';
                    
                    const row = document.createElement('div');
                    row.className = 'item-row';
                    row.innerHTML = `
                        <div class="move-btns">
                            <button class="btn-small" onclick="reorder('${catId}', ${idx}, -1)"><i class="fas fa-chevron-up"></i></button>
                            <button class="btn-small" onclick="reorder('${catId}', ${idx}, 1)"><i class="fas fa-chevron-down"></i></button>
                        </div>
                        <img src="${thumb}" class="thumb-preview">
                        <div>
                            <span class="badge">${db.portfolioTabs[catId]?.name || catId}</span>
                            <div style="font-weight:700; margin-top:5px">${vid.title}</div>
                        </div>
                        <div style="text-align:right">
                            <button class="btn-small" onclick="delVid('${catId}', ${idx})" style="background:#f44336; padding:8px 12px"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                    container.appendChild(row);
                });
            });
        }

        // --- Category Logic ---
        function renderCategories() {
            const container = document.getElementById('category-list');
            container.innerHTML = '';
            
            Object.keys(db.portfolioTabs).forEach(id => {
                const cat = db.portfolioTabs[id];
                const row = document.createElement('div');
                row.className = 'item-row cat-row';
                row.innerHTML = `
                    <div style="font-size: 1.2rem; color: var(--accent);"><i class="fas fa-tag"></i></div>
                    <div><strong style="color:#fff">${cat.name}</strong><br><small style="color:#666">ID: ${id}</small></div>
                    <div style="text-align:right">
                        <button class="btn-small" onclick="deleteCategory('${id}')" style="background:#f44336; padding:8px 12px"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function addNewCategory() {
            const name = prompt("Enter new category name (e.g. Real Estate):");
            if (!name) return;
            const id = name.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');
            
            if (db.portfolioTabs[id]) {
                alert("This category ID already exists.");
                return;
            }

            db.portfolioTabs[id] = { name: name, icon: "fas fa-video" };
            db.portfolioData[id] = [];
            
            sync().then(() => {
                populateSelects();
                renderCategories();
            });
        }

        function deleteCategory(id) {
            if(confirm(`Delete category "${db.portfolioTabs[id].name}" and ALL its videos?`)) {
                delete db.portfolioTabs[id];
                delete db.portfolioData[id];
                sync().then(() => {
                    populateSelects();
                    renderCategories();
                });
            }
        }

        // --- Sync/System ---
        async function sync() {
            db.lastUpdated = new Date().toISOString();
            const res = await fetch('/api/data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(db)
            });
            if(res.ok) updateCounts();
            return res.ok;
        }

        async function reorder(cat, idx, dir) {
            const arr = db.portfolioData[cat];
            const target = idx + dir;
            if (target >= 0 && target < arr.length) {
                [arr[idx], arr[target]] = [arr[target], arr[idx]];
                await sync();
                renderVideos();
            }
        }

        async function delVid(cat, idx) {
            if(confirm('Remove this video?')) {
                db.portfolioData[cat].splice(idx, 1);
                await sync();
                renderVideos();
            }
        }

        document.getElementById('videoForm').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const cat = fd.get('category');
            if(!db.portfolioData[cat]) db.portfolioData[cat] = [];
            
            db.portfolioData[cat].unshift({
                title: fd.get('title'),
                url: fd.get('url'),
                category: "", thumbnail: "", description: "", client: "", duration: ""
            });

            await sync();
            e.target.reset();
            toggleAddForm();
            renderVideos();
        };

        // --- Client Logic ---
        function renderClients() {
            const container = document.getElementById('client-list');
            container.innerHTML = '';
            if(!db.clients) return;

            db.clients.forEach((c, i) => {
                const div = document.createElement('div');
                div.className = 'client-item';
                div.innerHTML = `
                    <img src="${c.thumbnailUrl || 'icon.png'}">
                    <div style="font-weight:700">${c.name}</div>
                    <div style="color:var(--accent); font-size:0.8rem; margin-top:5px">${c.subscribers || ''}</div>
                    <button class="btn-small" onclick="delClient(${i})" style="margin-top:15px; color:#666">Delete</button>
                `;
                container.appendChild(div);
            });
        }

        document.getElementById('clientForm').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            if(!db.clients) db.clients = [];
            db.clients.push({
                name: fd.get('name'),
                channelUrl: fd.get('channelUrl'),
                subscribers: fd.get('subscribers'),
                thumbnailUrl: `https://ui-avatars.com/api/?name=${encodeURIComponent(fd.get('name'))}&background=ff6b35&color=fff`
            });
            await sync();
            e.target.reset();
            renderClients();
        };

        async function delClient(i) {
            db.clients.splice(i, 1);
            await sync();
            renderClients();
        }

        async function toggleVisibility() {
            db.showClients = !db.showClients;
            await sync();
        }

        function toggleAddForm() {
            const f = document.getElementById('add-form');
            f.style.display = f.style.display === 'none' ? 'block' : 'none';
        }

        function exportBackup() {
            const blob = new Blob([JSON.stringify(db, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        window.onload = init;
    </script>
</body>
</html>
